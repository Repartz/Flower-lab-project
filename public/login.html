<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход | Flower Lab Norilsk</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/mobile.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: var(--surface-container-lowest); border-radius: var(--radius-lg); box-shadow: var(--shadow-elevated); padding: 48px; width: 100%; max-width: 400px; }
    .login-card h1 { text-align: center; margin-bottom: 8px; }
    .login-card p { text-align: center; color: var(--on-surface-variant); margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 16px; border: 1px solid var(--outline-variant); border-radius: var(--radius-md); font-size: 16px; font-family: var(--font-body); }
    .form-group input:focus { outline: none; border-color: var(--primary); }
    .error-msg { color: var(--error); font-size: 14px; margin-bottom: 16px; display: none; }
    .login-logo { text-align: center; margin-bottom: 24px; }
    .login-logo svg { width: 60px; height: 60px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 40 40" fill="none"><path d="M20 5L25 15L35 20L25 25L20 35L15 25L5 20L15 15L20 5Z" fill="#7b5455"/></svg>
    </div>
    <h1>FLOWER LAB</h1>
    <p>Вход для сотрудников</p>
    <div class="error-msg" id="error-msg"></div>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Логин</label>
        <input type="text" id="login" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="login-btn">Войти</button>
    </form>
    <p style="margin-top:24px;text-align:center"><a href="/" style="color:var(--primary)">Вернуться на сайт</a></p>
  </div>

  <script src="/js/api.js?v=1781215710"></script>
  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = 'Вход...';
      errEl.style.display = 'none';

      try {
        const data = await api.auth.login(
          document.getElementById('login').value,
          document.getElementById('password').value
        );
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/admin/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Войти';
      }
    }

    if (localStorage.getItem('token')) {
      window.location.href = '/admin/dashboard.html';
    }
  </script>
  <script>
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function(e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (!target) return;
        const startY = window.scrollY;
        const endY = target.getBoundingClientRect().top + startY - 80;
        const distance = endY - startY;
        const duration = 1200;
        let start = null;
        function ease(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
        function step(ts) {
          if (!start) start = ts;
          const p = Math.min((ts - start) / duration, 1);
          window.scrollTo(0, startY + distance * ease(p));
          if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      });
    });
  </script>
  <script>
    function toggleMobileNav() {
      const nav = document.getElementById('mobile-nav');
      const hamburger = document.querySelector('.hamburger');
      nav.classList.toggle('active');
      hamburger.classList.toggle('active');
      document.body.style.overflow = nav.classList.contains('active') ? 'hidden' : '';
    }
  </script>
</body>
</html>
