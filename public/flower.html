<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Товар | Flower Lab Norilsk</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/product-detail.css">
  <link rel="stylesheet" href="css/products.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/footer.css">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body>
  <header class="header">
    <div class="header-container">
      <a href="/" class="logo">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none"><path d="M20 5L25 15L35 20L25 25L20 35L15 25L5 20L15 15L20 5Z" fill="#7b5455"/></svg>
        <span class="logo-text">FLOWER LAB</span>
      </a>
      <nav class="nav">
        <a href="/" class="nav-link">Главная</a>
        <a href="/catalog.html" class="nav-link">Каталог</a>
        <a href="/#about" class="nav-link">О нас</a>
        <a href="/#contact" class="nav-link">Контакты</a>
      </nav>
      <div class="header-actions">
        <a href="/cart.html" class="header-icon cart-count">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6h15l-1.5 9h-12z"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/></svg>
          <span class="cart-badge">0</span>
        </a>
        <a href="/login.html" class="header-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
      </div>
    </div>
  </header>

  <div class="container" style="padding-top:100px">
    <nav class="breadcrumb" id="breadcrumb"><a href="/catalog.html">Каталог</a> <span>/</span> <span id="breadcrumb-name">...</span></nav>
    <div class="product-detail" id="product-detail">
      <div class="product-detail-loading">Загрузка...</div>
    </div>
  </div>

  <section class="section" id="related-section" style="display:none">
    <div class="container">
      <div class="section-header">
        <p class="section-label">Вам может понравиться</p>
        <h2 class="section-title">Похожие букеты</h2>
      </div>
      <div class="products-grid" id="related-grid"></div>
    </div>
  </section>

  <footer class="footer" style="margin-top:60px">
    <div class="container"><div class="footer-bottom"><p class="footer-copyright">© 2026 Flower Lab Norilsk.</p></div></div>
  </footer>

  <script src="/js/api.js?v=1781215710"></script>
  <script src="/js/cart.js?v=1781215710"></script>
  <script src="/js/main.js?v=1781215710"></script>
  <script src="/js/animations.js?v=1"></script>
  <script>
    let currentFlower = null;
    let quantity = 1;

    async function loadProduct() {
      const id = new URLSearchParams(window.location.search).get('id');
      if (!id) { window.location.href = '/catalog.html'; return; }
      try {
        currentFlower = await api.flowers.get(id);
        renderProduct(currentFlower);
        loadRelated(currentFlower.category_id);
      } catch (err) {
        document.getElementById('product-detail').innerHTML = '<p>Товар не найден</p>';
      }
    }

    function renderProduct(f) {
      document.title = f.name + ' | Flower Lab Norilsk';
      document.getElementById('breadcrumb-name').textContent = f.name;
      const badges = [];
      if (f.is_hit) badges.push('<span class="detail-badge detail-badge-hit">Хит</span>');
      if (f.is_new) badges.push('<span class="detail-badge detail-badge-new">Новинка</span>');
      document.getElementById('product-detail').innerHTML = `
        <div class="detail-gallery">
          <div class="detail-gallery-main">
            <img id="main-image" src="${imageOrPlaceholder(f.photo_url)}" alt="${f.name}">
          </div>
        </div>
        <div class="detail-info">
          ${badges.length ? '<div class="detail-badge-row">' + badges.join('') + '</div>' : ''}
          <p class="detail-category">${f.category_name || ''}</p>
          <h1 class="detail-name">${f.name}</h1>
          <div class="detail-price-row">
            <span class="detail-price">${formatPrice(f.price)}</span>
            ${f.old_price ? `<span class="detail-old-price">${formatPrice(f.old_price)}</span>` : ''}
          </div>
          <div class="detail-divider"></div>
          ${f.description ? `<p class="detail-description">${f.description}</p>` : ''}
          <div class="detail-meta-grid">
            ${f.size_cm ? `
              <div class="detail-meta-item">
                <span class="detail-meta-icon">📐</span>
                <div><div class="detail-meta-label">Размер</div><div class="detail-meta-value">${f.size_cm} см</div></div>
              </div>` : ''}
            ${f.composition ? `
              <div class="detail-meta-item">
                <span class="detail-meta-icon">💐</span>
                <div><div class="detail-meta-label">Состав</div><div class="detail-meta-value">${f.composition}</div></div>
              </div>` : ''}
            <div class="detail-meta-item">
              <span class="detail-meta-icon">${f.stock_count > 0 ? '✅' : '❌'}</span>
              <div>
                <div class="detail-meta-label">Наличие</div>
                <div class="detail-meta-value">${f.stock_count > 0 ? f.stock_count + ' шт.' : 'Нет в наличии'}</div>
              </div>
            </div>
          </div>
          <div class="detail-actions">
            <div class="detail-qty">
              <button onclick="changeQty(-1)">−</button>
              <span id="qty">${quantity}</span>
              <button onclick="changeQty(1)">+</button>
            </div>
            <button class="detail-add-btn" id="add-to-cart-btn" onclick="addCurrentToCart()">В корзину</button>
          </div>
          <div class="detail-features">
            <div class="detail-feature">
              <span class="detail-feature-icon">🚚</span>
              <span class="detail-feature-text">Доставка<br>2-3 часа</span>
            </div>
            <div class="detail-feature">
              <span class="detail-feature-icon">🌿</span>
              <span class="detail-feature-text">Гарантия<br>свежести 7 дней</span>
            </div>
            <div class="detail-feature">
              <span class="detail-feature-icon">🌸</span>
              <span class="detail-feature-text">Сделано<br>в Норильске</span>
            </div>
          </div>
        </div>
      `;
    }

    function changeQty(d) {
      quantity = Math.max(1, quantity + d);
      document.getElementById('qty').textContent = quantity;
    }

    function addCurrentToCart() {
      if (!currentFlower) return;
      Cart.addItem(currentFlower, quantity);
      const btn = document.getElementById('add-to-cart-btn');
      btn.textContent = 'Добавлено!';
      btn.classList.add('added');
      setTimeout(() => { btn.textContent = 'В корзину'; btn.classList.remove('added'); }, 1500);
    }

    async function loadRelated(categoryId) {
      if (!categoryId) return;
      try {
        const flowers = await api.flowers.list({ category: '', limit: 3 });
        const related = flowers.filter(f => f.category_id === categoryId && f.flower_id !== currentFlower.flower_id).slice(0, 3);
        if (related.length > 0) {
          document.getElementById('related-section').style.display = 'block';
          document.getElementById('related-grid').innerHTML = related.map(f => `
            <div class="product-card">
              <a href="/flower.html?id=${f.flower_id}"><div class="product-image"><img src="${imageOrPlaceholder(f.photo_url)}" alt="${f.name}"></div></a>
              <div class="product-content">
                <h3 class="product-name"><a href="/flower.html?id=${f.flower_id}">${f.name}</a></h3>
                <p class="product-price">${formatPrice(f.price)}</p>
              </div>
            </div>
          `).join('');
        }
      } catch (e) {}
    }

    loadProduct();
  </script>
  <script>
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function(e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (!target) return;
        const startY = window.scrollY;
        const endY = target.getBoundingClientRect().top + startY - 80;
        const distance = endY - startY;
        const duration = 1200;
        let start = null;
        function ease(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
        function step(ts) {
          if (!start) start = ts;
          const p = Math.min((ts - start) / duration, 1);
          window.scrollTo(0, startY + distance * ease(p));
          if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      });
    });
  </script>
</body>
</html>
