<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог | Flower Lab Norilsk</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/products.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/footer.css">
  <style>
    .catalog-layout { display: flex; gap: 32px; padding-top: 100px; }
    .catalog-sidebar { width: 260px; flex-shrink: 0; }
    .catalog-content { flex: 1; }
    .filter-group { margin-bottom: 24px; }
    .filter-group h4 { font-family: var(--font-label); font-size: 12px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--primary); margin-bottom: 12px; }
    .filter-group label { display: block; padding: 6px 0; cursor: pointer; font-size: 14px; }
    .filter-group input[type="checkbox"] { margin-right: 8px; }
    .filter-group select, .filter-group input[type="number"] { width: 100%; padding: 8px 12px; border: 1px solid var(--outline-variant); border-radius: var(--radius-md); font-family: var(--font-body); font-size: 14px; background: var(--surface-container-lowest); }
    .sort-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .sort-bar select { padding: 8px 12px; border: 1px solid var(--outline-variant); border-radius: var(--radius-md); font-family: var(--font-body); }
    .load-more { text-align: center; margin-top: 32px; }
    .filter-toggle { display: none; margin-bottom: 16px; }
    .active-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .active-filter { background: var(--primary-container); color: var(--on-primary-container); padding: 4px 12px; border-radius: var(--radius-full); font-size: 12px; cursor: pointer; }
    @media (max-width: 1024px) {
      .catalog-layout { flex-direction: column; }
      .catalog-sidebar { width: 100%; display: none; }
      .catalog-sidebar.show { display: block; }
      .filter-toggle { display: block; }
    }
  </style>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body>
  <header class="header">
    <div class="header-container">
      <a href="/" class="logo">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none"><path d="M20 5L25 15L35 20L25 25L20 35L15 25L5 20L15 15L20 5Z" fill="#7b5455"/></svg>
        <span class="logo-text">FLOWER LAB</span>
      </a>
      <nav class="nav">
        <a href="/" class="nav-link">Главная</a>
        <a href="/catalog.html" class="nav-link active">Каталог</a>
        <a href="/#about" class="nav-link">О нас</a>
        <a href="/#contact" class="nav-link">Контакты</a>
      </nav>
      <div class="header-actions">
        <a href="/cart.html" class="header-icon cart-count">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6h15l-1.5 9h-12z"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/></svg>
          <span class="cart-badge">0</span>
        </a>
        <a href="/login.html" class="header-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
      </div>
    </div>
  </header>

  <div class="container">
    <button class="filter-toggle btn btn-secondary" onclick="document.querySelector('.catalog-sidebar').classList.toggle('show')">Фильтры</button>
    <div class="catalog-layout">
      <aside class="catalog-sidebar" id="filters">
        <div class="filter-group">
          <h4>Категория</h4>
          <div id="category-filters"></div>
        </div>
        <div class="filter-group">
          <h4>Повод</h4>
          <label><input type="checkbox" name="occasion" value="день рождения"> День рождения</label>
          <label><input type="checkbox" name="occasion" value="8 марта"> 8 Марта</label>
          <label><input type="checkbox" name="occasion" value="для неё"> Для неё</label>
          <label><input type="checkbox" name="occasion" value="свадьба"> Свадьба</label>
          <label><input type="checkbox" name="occasion" value="без повода"> Без повода</label>
        </div>
        <div class="filter-group">
          <h4>Цена</h4>
          <input type="number" id="min_price" placeholder="От" min="0">
          <input type="number" id="max_price" placeholder="До" min="0" style="margin-top:8px">
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="applyFilters()">Применить</button>
        <button class="btn btn-secondary" style="width:100%;margin-top:8px" onclick="resetFilters()">Сбросить</button>
      </aside>
      <main class="catalog-content">
        <div class="sort-bar">
          <span id="results-count"></span>
          <select id="sort-select" onchange="applyFilters()">
            <option value="new">По новизне</option>
            <option value="price_asc">Дешевле</option>
            <option value="price_desc">Дороже</option>
            <option value="popular">По популярности</option>
          </select>
        </div>
        <div class="products-grid" id="catalog-grid"></div>
        <div class="load-more" id="load-more" style="display:none">
          <button class="btn btn-secondary" onclick="loadMore()">Загрузить ещё</button>
        </div>
      </main>
    </div>
  </div>

  <footer id="contact" class="footer" style="margin-top:60px">
    <div class="container">
      <div class="footer-bottom">
        <p class="footer-copyright">© 2026 Flower Lab Norilsk. Все права защищены.</p>
      </div>
    </div>
  </footer>

  <script src="/js/api.js?v=1781215710"></script>
  <script src="/js/cart.js?v=1781215710"></script>
  <script src="/js/main.js?v=1781215710"></script>
  <script src="/js/animations.js?v=1"></script>
  <script>
    let currentPage = 0;
    const PAGE_SIZE = 12;
    let allFlowers = [];

    async function loadCategories() {
      try {
        const cats = await api.categories.list();
        const container = document.getElementById('category-filters');
        container.innerHTML = cats.map(c => `<label><input type="checkbox" name="category" value="${c.slug}"> ${c.name}</label>`).join('');
      } catch (e) {}
    }

    async function loadFlowers(append = false) {
      const params = { limit: PAGE_SIZE, offset: currentPage * PAGE_SIZE };
      const sort = document.getElementById('sort-select').value;
      if (sort) params.sort = sort;

      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('category')) params.category = urlParams.get('category');
      if (urlParams.get('occasion')) params.occasion = urlParams.get('occasion');

      document.querySelectorAll('input[name="category"]:checked').forEach(el => { if (!params.category) params.category = el.value; });
      document.querySelectorAll('input[name="occasion"]:checked').forEach(el => { if (!params.occasion) params.occasion = el.value; });

      const minP = document.getElementById('min_price').value;
      const maxP = document.getElementById('max_price').value;
      if (minP) params.min_price = minP;
      if (maxP) params.max_price = maxP;

      try {
        const flowers = await api.flowers.list(params);
        if (append) {
          allFlowers = allFlowers.concat(flowers);
        } else {
          allFlowers = flowers;
        }
        renderFlowers(allFlowers);
        document.getElementById('results-count').textContent = `Найдено: ${allFlowers.length}`;
        document.getElementById('load-more').style.display = flowers.length === PAGE_SIZE ? 'block' : 'none';
      } catch (err) {
        document.getElementById('catalog-grid').innerHTML = '<p style="text-align:center;grid-column:1/-1">Ошибка загрузки товаров</p>';
      }
    }

    function renderFlowers(flowers) {
      const grid = document.getElementById('catalog-grid');
      if (flowers.length === 0) {
        grid.innerHTML = '<p style="text-align:center;grid-column:1/-1">Товары не найдены</p>';
        return;
      }
      grid.innerHTML = flowers.map(f => {
        const badge = f.is_new
          ? '<span class="product-badge" style="background:rgba(46,125,50,0.92);color:#fff;backdrop-filter:none">Новинка</span>'
          : f.is_hit
            ? '<span class="product-badge">Хит</span>'
            : '';
        return `
        <div class="product-card">
          <a href="/flower.html?id=${f.flower_id}" class="product-image">
            <img src="${imageOrPlaceholder(f.photo_url)}" alt="${f.name}" loading="lazy">
            ${badge}
          </a>
          <div class="product-content">
            <p class="product-category">${f.category_name || ''}</p>
            <h3 class="product-name"><a href="/flower.html?id=${f.flower_id}">${f.name}</a></h3>
            <p class="product-price">${formatPrice(f.price)}</p>
            <div class="product-actions">
              <button class="product-btn product-btn-primary" onclick='addToCart(${JSON.stringify({flower_id:f.flower_id,name:f.name,price:f.price,photo_url:f.photo_url})})'>В корзину</button>
              <a href="/flower.html?id=${f.flower_id}" class="product-btn product-btn-secondary">Подробнее</a>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function addToCart(flower) {
      Cart.addItem(flower);
      event.target.textContent = 'Добавлено!';
      setTimeout(() => { event.target.textContent = 'В корзину'; }, 1500);
    }

    function applyFilters() { currentPage = 0; loadFlowers(); }
    function resetFilters() {
      document.querySelectorAll('.catalog-sidebar input[type="checkbox"]').forEach(el => el.checked = false);
      document.getElementById('min_price').value = '';
      document.getElementById('max_price').value = '';
      currentPage = 0;
      window.history.replaceState({}, '', '/catalog.html');
      loadFlowers();
    }
    function loadMore() { currentPage++; loadFlowers(true); }

    loadCategories();
    loadFlowers();
  </script>
  <script>
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function(e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (!target) return;
        const startY = window.scrollY;
        const endY = target.getBoundingClientRect().top + startY - 80;
        const distance = endY - startY;
        const duration = 1200;
        let start = null;
        function ease(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
        function step(ts) {
          if (!start) start = ts;
          const p = Math.min((ts - start) / duration, 1);
          window.scrollTo(0, startY + distance * ease(p));
          if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      });
    });
  </script>
</body>
</html>
