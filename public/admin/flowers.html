<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Товары | Flower Lab Admin</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout" id="admin-layout">
    <div id="sidebar"></div>
    <main class="admin-main">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
        <h1>Товары</h1>
        <button class="btn btn-primary" onclick="openModal()">Добавить товар</button>
      </div>
      <input type="text" id="search" placeholder="Поиск..." style="padding:10px 16px;border:1px solid var(--outline-variant);border-radius:8px;width:100%;max-width:400px;margin-bottom:24px;font-size:14px" oninput="filterTable()">
      <table class="admin-table" id="flowers-table">
        <thead><tr><th>Фото</th><th>Название</th><th>Категория</th><th>Цена</th><th>Остаток</th><th>Хит</th><th>Действия</th></tr></thead>
        <tbody></tbody>
      </table>
    </main>
  </div>

  <div class="admin-modal" id="modal" style="display:none">
    <div class="admin-modal-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
        <h2 id="modal-title">Добавить товар</h2>
        <button onclick="closeModal()" style="background:none;border:none;font-size:24px;cursor:pointer">✕</button>
      </div>
      <form id="flower-form" onsubmit="saveFlower(event)">
        <input type="hidden" id="flower_id">
        <div class="form-row">
          <div class="form-group"><label>Название *</label><input type="text" id="f_name" required></div>
          <div class="form-group"><label>Slug</label><input type="text" id="f_slug"></div>
        </div>
        <div class="form-group"><label>Описание</label><textarea id="f_description" rows="3"></textarea></div>
        <div class="form-group"><label>Состав</label><input type="text" id="f_composition"></div>
        <div class="form-row">
          <div class="form-group"><label>Цена *</label><input type="number" id="f_price" required min="0"></div>
          <div class="form-group"><label>Старая цена</label><input type="number" id="f_old_price" min="0"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Размер (см)</label><input type="number" id="f_size_cm" min="0"></div>
          <div class="form-group"><label>Остаток</label><input type="number" id="f_stock_count" min="0" value="0"></div>
        </div>
        <div class="form-group"><label>Категория</label><select id="f_category_id"></select></div>
        <div class="form-group"><label>Цвета (через запятую)</label><input type="text" id="f_color_tags" placeholder="розовый, белый"></div>
        <div class="form-group"><label>Поводы (через запятую)</label><input type="text" id="f_occasion_tags" placeholder="birthday, march8"></div>
        <div class="form-group"><label>Фото</label><input type="file" id="f_photo" accept="image/*"></div>
        <div class="form-row">
          <label><input type="checkbox" id="f_is_hit"> Хит</label>
          <label><input type="checkbox" id="f_is_new"> Новинка</label>
        </div>
        <div id="form-error" style="color:red;margin:12px 0"></div>
        <button type="submit" class="btn btn-primary" style="width:100%">Сохранить</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js?v=1781215710"></script>
  <script src="/js/main.js?v=1781215710"></script>
  <script src="/js/admin.js?v=1781215710"></script>
  <script>
    let allFlowers = [];
    let currentUser = null;

    (async function() {
      currentUser = await checkAuth();
      if (!currentUser) return;
      document.getElementById('sidebar').innerHTML = renderAdminSidebar('flowers');
      await loadFlowers();
      await loadCategories();
    })();

    async function loadFlowers() {
      allFlowers = await api.flowers.list({});
      renderTable(allFlowers);
    }

    async function loadCategories() {
      const cats = await api.categories.list();
      document.getElementById('f_category_id').innerHTML = '<option value="">—</option>' + cats.map(c => `<option value="${c.category_id}">${c.name}</option>`).join('');
    }

    function renderTable(flowers) {
      document.querySelector('#flowers-table tbody').innerHTML = flowers.map(f => `<tr>
        <td><img src="${imageOrPlaceholder(f.photo_url)}" style="width:50px;height:50px;object-fit:cover;border-radius:6px"></td>
        <td>${f.name}</td><td>${f.category_name || '—'}</td><td>${formatPrice(f.price)}</td>
        <td>${f.stock_count}</td><td>${f.is_hit ? '✓' : ''}</td>
        <td><button onclick="editFlower(${f.flower_id})" style="margin-right:8px">✏️</button>
        ${isAdmin(currentUser) ? `<button onclick="deleteFlower(${f.flower_id})">🗑️</button>` : ''}</td>
      </tr>`).join('');
    }

    function filterTable() {
      const q = document.getElementById('search').value.toLowerCase();
      renderTable(allFlowers.filter(f => f.name.toLowerCase().includes(q)));
    }

    function openModal() {
      document.getElementById('modal').style.display = 'flex';
      document.getElementById('modal-title').textContent = 'Добавить товар';
      document.getElementById('flower-form').reset();
      document.getElementById('flower_id').value = '';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function editFlower(id) {
      const f = allFlowers.find(x => x.flower_id === id);
      if (!f) return;
      document.getElementById('modal').style.display = 'flex';
      document.getElementById('modal-title').textContent = 'Редактировать товар';
      document.getElementById('flower_id').value = f.flower_id;
      document.getElementById('f_name').value = f.name;
      document.getElementById('f_slug').value = f.slug || '';
      document.getElementById('f_description').value = f.description || '';
      document.getElementById('f_composition').value = f.composition || '';
      document.getElementById('f_price').value = f.price;
      document.getElementById('f_old_price').value = f.old_price || '';
      document.getElementById('f_size_cm').value = f.size_cm || '';
      document.getElementById('f_stock_count').value = f.stock_count || 0;
      document.getElementById('f_category_id').value = f.category_id || '';
      document.getElementById('f_color_tags').value = (f.color_tags || []).join(', ');
      document.getElementById('f_occasion_tags').value = (f.occasion_tags || []).join(', ');
      document.getElementById('f_is_hit').checked = f.is_hit;
      document.getElementById('f_is_new').checked = f.is_new;
    }

    async function saveFlower(e) {
      e.preventDefault();
      const id = document.getElementById('flower_id').value;
      const fd = new FormData();
      fd.append('name', document.getElementById('f_name').value);
      fd.append('slug', document.getElementById('f_slug').value || document.getElementById('f_name').value.toLowerCase().replace(/\s+/g, '-'));
      fd.append('description', document.getElementById('f_description').value);
      fd.append('composition', document.getElementById('f_composition').value);
      fd.append('price', document.getElementById('f_price').value);
      fd.append('old_price', document.getElementById('f_old_price').value || '');
      fd.append('size_cm', document.getElementById('f_size_cm').value || '');
      fd.append('stock_count', document.getElementById('f_stock_count').value || '0');
      fd.append('category_id', document.getElementById('f_category_id').value || '');
      fd.append('color_tags', document.getElementById('f_color_tags').value);
      fd.append('occasion_tags', document.getElementById('f_occasion_tags').value);
      fd.append('is_hit', document.getElementById('f_is_hit').checked);
      fd.append('is_new', document.getElementById('f_is_new').checked);
      const photo = document.getElementById('f_photo').files[0];
      if (photo) fd.append('photo', photo);

      try {
        if (id) {
          await api.flowers.update(id, fd);
        } else {
          await api.flowers.create(fd);
        }
        closeModal();
        await loadFlowers();
      } catch (err) {
        console.error('SAVE FLOWER ERROR:', err);
        document.getElementById('form-error').textContent = err.message || JSON.stringify(err);
      }
    }

    async function deleteFlower(id) {
      if (!confirm('Удалить товар?')) return;
      try { await api.flowers.delete(id); await loadFlowers(); } catch (err) { alert(err.message); }
    }
  </script>
</body>
</html>
